<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Sealo "Seal of Approval" 도장 — Lottie Creator 업로드용 단독 파일 (라벨 없음, 투명 배경) -->
  <style>
    .red { stroke: #C0392B; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .red-fill { fill: #C0392B; }
  </style>
  <g transform="translate(256,256)">
    <circle class="red" r="230" stroke-width="14"/>
    <circle class="red" r="162" stroke-width="8"/>
    <defs>
      <path id="topArc" d="M -190 0 A 190 190 0 0 1 190 0" fill="none"/>
      <path id="bottomArc" d="M -190 0 A 190 190 0 0 0 190 0" fill="none"/>
    </defs>
    <text class="red-fill" font-size="46" font-weight="bold" letter-spacing="8">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">SEAL OF APPROVAL</textPath>
