    <circle class="red-fill" cx="-30" cy="0" r="9.5"/>
    <circle class="red-fill" cx="30" cy="0" r="9.5"/>
    <path class="red" stroke-width="8" d="M -14 27 Q 0 38 14 27"/>
    <path class="red" stroke-width="5.5" d="M -49 11 L -81 5 M 49 11 L 81 5"/>
